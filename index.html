<!DOCTYPE html>
<html lang="pt-br" class="">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevLinks</title>
    <link rel="stylesheet" href="./style.css"
  </head>
  <body>
    <div id="container">
      <div id="profile">
        <img src="./assets/avatar1.png" alt="Rafael, óculos, praia"/>
        <p>@raffadom</p>
      </div>
      <div id="switch" onclick="toggleMode()">
        <button></button>
        <span></span>
      </div>
      <ul>
        <li>
          <a
            href="https://www.linkedin.com/in/rafael-domingos-qa"

            >Acesse meu Linkedin</a
          >
        </li>
        <li>
          <a href="https://www.instagram.com/raffadom/" target="_blank"
            >Acesse meu Instagram</a
          >
        </li>
        <li>
          <a href="https://github.com/Raffadom" target="_blank"

          >

      <div id="social-links">
        <a
          href="https://www.linkedin.com/in/rafael-domingos-aab12060/"

        </a>
        <a href="https://www.instagram.com/raffadom/" target="_blank">

        <a href="https://github.com/Raffadom" target="_blank">

        </a>
        <a href="https://www.youtube.com/" target="_blank">
          <ion-icon name="logo-youtube"></ion-icon>
        </a>
      </div>
      <footer>
        Discover by
        <a href="https://rocketseat.com.br/" target="_blank">Rocketseat</a>
      </footer>
    </div>
    <script
      type="module"
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"
    ></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"
    ></script>
    <script src="./script.js"></script>
